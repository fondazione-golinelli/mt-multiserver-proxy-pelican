name: Build and publish mt-multiserver-proxy Pelican image

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build even if this upstream commit is already published"
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  UPSTREAM_REPO: fondazione-golinelli/mt-multiserver-proxy

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      upstream_sha: ${{ steps.upstream.outputs.sha }}
      upstream_short_sha: ${{ steps.upstream.outputs.short_sha }}
      upstream_timestamp: ${{ steps.upstream.outputs.timestamp }}
      version_tag: ${{ steps.upstream.outputs.version_tag }}
      should_build: ${{ steps.upstream.outputs.should_build }}
    steps:
      - name: Query upstream main commit
        id: upstream
        run: |
          DATA=$(curl -fsSL "https://api.github.com/repos/${{ env.UPSTREAM_REPO }}/commits/main")
          SHA=$(echo "$DATA" | jq -r '.sha')
          SHORT_SHA=$(printf '%s' "$SHA" | cut -c1-12)
          COMMIT_DATE=$(echo "$DATA" | jq -r '.commit.committer.date')
          TIMESTAMP=$(date -u -d "$COMMIT_DATE" +%Y%m%d%H%M%S)
          VERSION_TAG="${TIMESTAMP}-${SHORT_SHA}"

          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "timestamp=${TIMESTAMP}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "${{ env.REGISTRY }}/v2/${{ env.IMAGE_NAME }}/manifests/${VERSION_TAG}")

          if [ "$STATUS" = "200" ] && [ "${{ inputs.force_build || false }}" != "true" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.should_build == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            MT_MULTISERVER_PROXY_REPO=${{ env.UPSTREAM_REPO }}
            MT_MULTISERVER_PROXY_VERSION=${{ needs.check.outputs.upstream_sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check.outputs.version_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check.outputs.upstream_short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
